<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vamoose</title>
<style>
  :root {
    --bg:#141517; --side:#191a1d; --panel:#1c1d20; --card:#202226; --card-hi:#26282d;
    --line:rgba(255,255,255,.07); --line-hi:rgba(255,255,255,.14);
    --amber:#e0a94a; --amber-soft:rgba(224,169,74,.13); --amber-line:rgba(224,169,74,.42);
    --fg:#ececec; --dim:#9a9ba0; --faint:#6d6e73;
    --green:#5bbd7a; --red:#e0674c; --blue:#6ea8d8;
    --shadow:0 10px 34px rgba(0,0,0,.45); --side-w:236px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--fg); font:15px/1.55 var(--font); -webkit-font-smoothing:antialiased; }
  a { color:inherit; text-decoration:none; }

  /* Sidebar */
  .sidebar { position:fixed; top:0; left:0; bottom:0; width:var(--side-w); z-index:30;
    background:var(--side); border-right:1px solid var(--line); display:flex; flex-direction:column;
    padding:1.15rem 1rem 1rem; transition:transform .22s ease; }
  .logo { display:flex; align-items:center; gap:.55rem; padding:.1rem .35rem 1.15rem; }
  .logo img { width:34px; height:34px; object-fit:contain; }
  .logo span { font-size:1.24rem; font-weight:760; letter-spacing:.005em; }
  .logo b { color:var(--amber); font-weight:760; }
  .nav { display:flex; flex-direction:column; gap:.18rem; }
  .nav-link { display:flex; align-items:center; gap:.55rem; padding:.5rem .6rem; border-radius:9px;
    color:var(--dim); font-weight:560; font-size:.94rem; transition:.14s ease; }
  .nav-link:hover { background:rgba(255,255,255,.04); color:var(--fg); }
  .nav-link.active { background:var(--amber-soft); color:var(--amber); }
  .nav-link .ni { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.55; }
  .nav-badge { margin-left:auto; font-size:.72rem; color:var(--faint); font-family:var(--mono); }
  .side-foot { margin-top:auto; padding-top:1rem; border-top:1px solid var(--line); display:flex;
    flex-direction:column; gap:.5rem; }
  .gh-link { display:flex; align-items:center; gap:.5rem; color:var(--dim); font-size:.9rem;
    padding:.3rem .35rem; border-radius:8px; }
  .gh-link:hover { color:var(--fg); }
  .ver { color:var(--faint); font-size:.78rem; font-family:var(--mono); padding:0 .35rem; }

  /* Content */
  .content { margin-left:var(--side-w); min-height:100vh; }
  .topbar { position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:.7rem;
    height:56px; padding:0 1.6rem; background:rgba(20,21,23,.8); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); }
  .topbar-title { font-weight:640; color:var(--dim); }
  .spacer { flex:1; }
  .gh-icon { color:var(--dim); display:flex; padding:.35rem; border-radius:8px; transition:.14s; }
  .gh-icon:hover { color:var(--fg); background:rgba(255,255,255,.05); }
  .hamburger { display:none; }

  main { max-width:1120px; padding:1.7rem 1.6rem 4rem; }
  .sec { margin-bottom:2.3rem; scroll-margin-top:74px; }
  .sec-head { display:flex; align-items:baseline; gap:.7rem; margin:0 0 1rem; }
  .sec-head h2 { font-size:1.1rem; font-weight:700; margin:0; }
  .sec-head .count { color:var(--faint); font-size:.85rem; }
  .sec-head::before { content:""; width:3px; height:1.08rem; background:var(--amber); border-radius:2px; }

  .grid { display:grid; gap:.9rem; grid-template-columns:repeat(auto-fill,minmax(258px,1fr)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:1rem 1.1rem;
    transition:.18s ease; display:flex; flex-direction:column; }
  .card:hover { background:var(--card-hi); border-color:var(--line-hi); transform:translateY(-2px); box-shadow:var(--shadow); }
  .wf-top { display:flex; align-items:center; gap:.5rem; margin-bottom:.35rem; }
  .wf-name { font-weight:660; font-size:1rem; }
  .pill { font-size:.66rem; letter-spacing:.03em; text-transform:uppercase; color:var(--dim);
    border:1px solid var(--line-hi); border-radius:1rem; padding:.08rem .5rem; }
  .wf-desc { color:var(--dim); font-size:.88rem; flex:1; }
  .wf-run { align-self:flex-start; margin-top:.85rem; }

  button { font:inherit; cursor:pointer; border-radius:9px; border:1px solid transparent;
    padding:.42rem .9rem; font-weight:620; transition:.15s ease; }
  .btn-primary { background:var(--amber); color:#1a1206; }
  .btn-primary:hover { filter:brightness(1.07); }
  .btn-ghost { background:transparent; color:var(--amber); border-color:var(--amber-line); }
  .btn-ghost:hover { background:var(--amber-soft); }
  .btn-sm { padding:.28rem .7rem; font-size:.83rem; }
  .btn-quiet { background:transparent; color:var(--dim); border-color:var(--line-hi); }
  .btn-quiet:hover { color:var(--fg); background:rgba(255,255,255,.04); }
  .btn-danger { background:transparent; color:var(--red); border-color:rgba(224,103,76,.4); }
  .btn-danger:hover { background:rgba(224,103,76,.12); }
  .empty { color:var(--faint); font-style:italic; padding:.4rem 0; }

  .watch { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:.85rem 1rem; margin-bottom:.7rem; }
  .watch-top { display:flex; align-items:center; gap:.5rem; }
  .watch-name { font-weight:620; }
  .watch-meta { color:var(--dim); font-size:.85rem; margin-top:.15rem; }
  .watch-acts { display:flex; gap:.45rem; margin-top:.7rem; flex-wrap:wrap; }

  .hist { border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .hrow { display:flex; align-items:center; gap:.7rem; padding:.55rem .95rem; border-top:1px solid var(--line); font-size:.9rem; }
  .hrow:first-child { border-top:0; }
  .hrow:hover { background:rgba(255,255,255,.02); }
  .dot { width:8px; height:8px; border-radius:50%; flex:none; background:var(--dim); }
  .act { font-weight:640; text-transform:capitalize; min-width:76px; }
  .hactor { color:var(--dim); }
  .hmeta { color:var(--faint); font-family:var(--mono); font-size:.8rem; margin-left:auto; white-space:nowrap; }
  .showall { margin-top:.8rem; }

  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:1rem; }
  .overlay.open { display:flex; }
  .modal { width:min(520px,100%); background:var(--panel); border:1px solid var(--line-hi);
    border-radius:16px; box-shadow:var(--shadow); padding:1.35rem 1.5rem 1.5rem; }
  .modal h3 { margin:0 0 1rem; font-size:1.1rem; }
  .modal h3 b { color:var(--amber); }
  label { display:block; color:var(--dim); font-size:.8rem; margin:.75rem 0 .28rem; }
  input, select { width:100%; background:#141518; color:var(--fg); border:1px solid var(--line-hi);
    border-radius:9px; padding:.5rem .7rem; font:inherit; }
  input:focus { outline:none; border-color:var(--amber-line); }
  .modal-acts { display:flex; gap:.6rem; margin-top:1.2rem; align-items:center; }
  pre { background:#111214; border:1px solid var(--line); border-radius:10px; padding:.8rem;
    white-space:pre-wrap; word-break:break-word; color:var(--dim); max-height:240px; overflow:auto;
    font-family:var(--mono); font-size:.82rem; margin:1rem 0 0; }
  .toast { position:fixed; bottom:1.2rem; left:calc(50% + var(--side-w)/2); transform:translateX(-50%);
    background:var(--card-hi); border:1px solid var(--line-hi); border-radius:10px; padding:.6rem 1rem;
    box-shadow:var(--shadow); font-size:.9rem; display:none; z-index:60; }
  .toast.show { display:block; }
  .scrim { display:none; }

  @media (max-width:880px) {
    .sidebar { transform:translateX(-100%); box-shadow:var(--shadow); }
    .sidebar.open { transform:translateX(0); }
    .content { margin-left:0; }
    .hamburger { display:inline-flex; background:transparent; border:1px solid var(--line-hi); color:var(--fg);
      border-radius:8px; padding:.3rem .55rem; font-size:1.05rem; }
    .toast { left:50%; }
    .scrim.open { display:block; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:29; }
  }
</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <a class="logo" href="#top"><img src="mark.png" alt=""><span>va<b>moose</b></span></a>
  <nav class="nav" id="nav">
    <a href="#workflows" class="nav-link" data-s="workflows"><span class="ni"></span>Workflows</a>
    <a href="#watching" class="nav-link" data-s="watching"><span class="ni"></span>Watching<span class="nav-badge" id="nav-w"></span></a>
    <a href="#history" class="nav-link" data-s="history"><span class="ni"></span>Run history</a>
  </nav>
  <div class="side-foot">
    <a class="gh-link" href="https://github.com/dcadolph/vamoose" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
    <div class="ver" id="ver"></div>
  </div>
</aside>
<div class="scrim" id="scrim"></div>

<div class="content" id="top">
  <div class="topbar">
    <button class="hamburger" id="hamb" aria-label="Menu">☰</button>
    <span class="topbar-title">Dashboard</span>
    <span class="spacer"></span>
    <a class="gh-icon" href="https://github.com/dcadolph/vamoose" target="_blank" rel="noopener" title="View on GitHub">
      <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </div>

  <main>
    <section id="workflows" class="sec">
      <div class="sec-head"><h2>Workflows</h2><span class="count" id="wfcount"></span></div>
      <div class="grid" id="workflows-grid"><div class="empty">Loading…</div></div>
    </section>
    <section id="watching" class="sec">
      <div class="sec-head"><h2>Watching</h2><span class="count" id="wcount"></span></div>
      <div id="watches"><div class="empty">Loading…</div></div>
    </section>
    <section id="history" class="sec">
      <div class="sec-head"><h2>Run history</h2><span class="count" id="hcount"></span></div>
      <div id="history-list"><div class="empty">Loading…</div></div>
    </section>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <h3>Run <b id="runwf"></b></h3>
    <label>When (a phrase like "next week", or leave blank)</label>
    <input id="phrase" placeholder="next week">
    <label>Subject (optional)</label>
    <input id="subject" placeholder="Out: beach week">
    <label>Manager email (optional)</label>
    <input id="manager" placeholder="boss@work.com">
    <div class="modal-acts">
      <button class="btn-ghost" onclick="doRun(true)">Dry run</button>
      <button class="btn-primary" onclick="doRun(false)">Run</button>
      <span class="spacer"></span>
      <button class="btn-quiet" onclick="closeModal()">Close</button>
    </div>
    <pre id="runout" style="display:none"></pre>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => (s ?? "").toString().replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtTime = (t) => (t || "").replace("T", " ").slice(0, 19);
const HIST_CAP = 20;
const dotColor = { approved:"var(--green)", declined:"var(--red)", canceled:"var(--red)", expired:"var(--red)",
  created:"var(--amber)", advanced:"var(--amber)", notified:"var(--blue)", messaged:"var(--blue)",
  noted:"var(--blue)", filed:"var(--blue)" };

async function getJSON(p) { const r = await fetch(p); if (!r.ok) throw new Error(await r.text()); return r.json(); }
function toast(m) { const t = $("toast"); t.textContent = m; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 2600); }

async function loadWorkflows() {
  try {
    const wfs = await getJSON("/api/workflows");
    $("wfcount").textContent = wfs.length + (wfs.length === 1 ? " workflow" : " workflows");
    $("workflows-grid").innerHTML = wfs.map(w =>
      `<div class="card"><div class="wf-top"><span class="wf-name">${esc(w.name)}</span><span class="pill">${esc(w.source)}</span></div>
        <div class="wf-desc">${esc(w.description) || "&nbsp;"}</div>
        <button class="btn-ghost btn-sm wf-run" onclick="openModal('${esc(w.name)}')">Run ▸</button></div>`
    ).join("") || `<div class="empty">No workflows.</div>`;
  } catch (e) { $("workflows-grid").innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

async function loadWatches() {
  try {
    const items = await getJSON("/api/watches");
    $("wcount").textContent = items.length ? items.length + " held" : "";
    $("nav-w").textContent = items.length || "";
    $("watches").innerHTML = items.length ? items.map(w => {
      const id = esc(w.hold_id), p = esc(w.provider);
      return `<div class="watch"><div class="watch-top"><span class="watch-name">${esc(w.subject || w.hold_id)}</span><span class="pill">${p}</span></div>
        <div class="watch-meta">${esc(w.workflow)} · step ${w.step}${w.approver ? " · awaiting " + esc(w.approver) : ""}</div>
        <div class="watch-acts">
          <button class="btn-quiet btn-sm" data-a="check" data-id="${id}" data-p="${p}">Check</button>
          <button class="btn-ghost btn-sm" data-a="promote" data-id="${id}" data-p="${p}">Promote</button>
          <button class="btn-danger btn-sm" data-a="cancel" data-id="${id}" data-p="${p}">Cancel</button>
        </div></div>`;
    }).join("") : `<div class="empty">Nothing is being watched. Run a workflow with --watch and the daemon advances it here.</div>`;
  } catch (e) { $("watches").innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

let allHist = [], histExpanded = false;
function renderHistory() {
  const evs = allHist.slice().reverse();
  $("hcount").textContent = evs.length ? evs.length + " events" : "";
  if (!evs.length) { $("history-list").innerHTML = `<div class="empty">No run history yet.</div>`; return; }
  const shown = histExpanded ? evs : evs.slice(0, HIST_CAP);
  const rows = shown.map(e =>
    `<div class="hrow"><span class="dot" style="background:${dotColor[e.action] || "var(--dim)"}"></span>
      <span class="act">${esc(e.action)}</span><span>${esc(e.workflow || "")}</span>
      ${e.actor ? `<span class="hactor">· ${esc(e.actor)}</span>` : ""}
      <span class="hmeta">${esc(fmtTime(e.time))}${e.hold_id ? " · " + esc(e.hold_id) : ""}</span></div>`).join("");
  const more = evs.length > HIST_CAP
    ? `<button class="btn-quiet btn-sm showall" onclick="toggleHist()">${histExpanded ? "Show fewer" : "Show all " + evs.length}</button>` : "";
  $("history-list").innerHTML = `<div class="hist">${rows}</div>${more}`;
}
function toggleHist() { histExpanded = !histExpanded; renderHistory(); }
async function loadHistory() {
  try { allHist = await getJSON("/api/history"); renderHistory(); }
  catch (e) { $("history-list").innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

let currentWf = "";
function openModal(name) {
  currentWf = name; $("runwf").textContent = name;
  $("runout").style.display = "none"; $("runout").textContent = "";
  $("phrase").value = ""; $("subject").value = ""; $("manager").value = "";
  $("overlay").classList.add("open"); $("phrase").focus();
}
function closeModal() { $("overlay").classList.remove("open"); }
$("overlay").addEventListener("click", (e) => { if (e.target === $("overlay")) closeModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

async function doRun(dry) {
  const out = $("runout"); out.style.display = "block"; out.textContent = "Running…";
  try {
    const r = await fetch("/api/run", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ workflow: currentWf, phrase: $("phrase").value, subject: $("subject").value, manager: $("manager").value, dryRun: dry }) });
    const d = await r.json();
    out.textContent = (d.error ? "Error: " + d.error + "\n\n" : "") + (d.output || "");
    if (!d.error && !dry) toast("Ran " + currentWf);
  } catch (e) { out.textContent = e.message; }
  loadWatches(); loadHistory();
}
async function action(a, id, provider) {
  toast(a + " " + id + "…");
  try {
    const r = await fetch("/api/action", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ action:a, holdID:id, provider }) });
    const d = await r.json();
    toast(d.error ? a + " failed" : (d.output || a).split("\n")[0].slice(0, 80));
  } catch (e) { toast(e.message); }
  loadWatches(); loadHistory();
}
$("watches").addEventListener("click", (e) => { const b = e.target.closest("button[data-a]"); if (b) action(b.dataset.a, b.dataset.id, b.dataset.p); });

// Sidebar (mobile) toggle.
function setNav(open) { $("sidebar").classList.toggle("open", open); $("scrim").classList.toggle("open", open); }
$("hamb").addEventListener("click", () => setNav(!$("sidebar").classList.contains("open")));
$("scrim").addEventListener("click", () => setNav(false));
document.querySelectorAll(".nav-link").forEach(l => l.addEventListener("click", () => setNav(false)));

// Scrollspy: highlight the nav link for the section in view.
const links = {}; document.querySelectorAll(".nav-link").forEach(l => links[l.dataset.s] = l);
["workflows","watching","history"].forEach(id => {
  new IntersectionObserver((ents) => { ents.forEach(en => { if (en.isIntersecting) {
    Object.values(links).forEach(l => l.classList.remove("active")); links[id].classList.add("active"); } }); },
    { rootMargin:"-45% 0px -50% 0px" }).observe($(id));
});

(async () => { try { $("ver").textContent = await (await fetch("/api/version")).text(); } catch {} })();
loadWorkflows(); loadWatches(); loadHistory();
setInterval(() => { loadWatches(); loadHistory(); }, 15000);
</script>
</body>
</html>
