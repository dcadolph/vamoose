name: release

# Cross-builds vamoose on every v* tag, attaches the Homebrew-style archives and
# checksums to the release, and (when a tap token is present) bumps the formula.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Test
        run: go test ./...

      - name: Install gox
        run: go install github.com/mitchellh/gox@latest

      - name: Cross-build and package
        env:
          TAG: ${{ github.ref_name }}
          # Built-in Google OAuth desktop client, so users sign in with `vamoose login`
          # without registering their own Cloud project. Empty when the secrets are
          # unset, which leaves the built-in client off and changes no behavior.
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          pkg="github.com/dcadolph/vamoose/cmd"
          mkdir -p build dist
          gox -osarch="darwin/amd64 darwin/arm64 linux/amd64 linux/arm64" \
            -ldflags="-s -w -X '${pkg}.version=${VER}' -X '${pkg}.builtinGoogleClientID=${GOOGLE_CLIENT_ID}' -X '${pkg}.builtinGoogleClientSecret=${GOOGLE_CLIENT_SECRET}'" \
            -output="build/vamoose_{{.OS}}_{{.Arch}}" .
          for f in build/vamoose_*; do
            base="${f#build/vamoose_}"
            os="${base%%_*}"
            arch="${base##*_}"
            case "$os" in darwin) osl=Darwin ;; linux) osl=Linux ;; esac
            case "$arch" in amd64) al=x86_64 ;; arm64) al=arm64 ;; esac
            cp "$f" build/vamoose
            tar -C build -czf "dist/vamoose_${VER}_${osl}_${al}.tar.gz" vamoose
            rm build/vamoose
          done
          ( cd dist && sha256sum *.tar.gz | tee checksums.txt )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          fail_on_unmatched_files: true

      - name: Bump Homebrew formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping formula bump"
            exit 0
          fi
          VER="${TAG#v}"
          da=$(sha256sum "dist/vamoose_${VER}_Darwin_arm64.tar.gz" | cut -d' ' -f1)
          di=$(sha256sum "dist/vamoose_${VER}_Darwin_x86_64.tar.gz" | cut -d' ' -f1)
          la=$(sha256sum "dist/vamoose_${VER}_Linux_arm64.tar.gz" | cut -d' ' -f1)
          li=$(sha256sum "dist/vamoose_${VER}_Linux_x86_64.tar.gz" | cut -d' ' -f1)
          base="https://github.com/dcadolph/vamoose/releases/download/v${VER}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/dcadolph/homebrew-tap.git" tap
          cat > tap/Formula/vamoose.rb <<EOF
          class Vamoose < Formula
            desc "Calendar workflow engine for time off, approvals, and quick actions"
            homepage "https://github.com/dcadolph/vamoose"
            version "${VER}"
            license "BUSL-1.1"

            on_macos do
              on_arm do
                url "${base}/vamoose_${VER}_Darwin_arm64.tar.gz"
                sha256 "${da}"
              end
              on_intel do
                url "${base}/vamoose_${VER}_Darwin_x86_64.tar.gz"
                sha256 "${di}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/vamoose_${VER}_Linux_arm64.tar.gz"
                sha256 "${la}"
              end
              on_intel do
                url "${base}/vamoose_${VER}_Linux_x86_64.tar.gz"
                sha256 "${li}"
              end
            end

            def install
              bin.install "vamoose"
            end

            test do
              system "#{bin}/vamoose", "version"
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vamoose.rb
          git commit -m "Update vamoose to ${VER}"
          # Another formula's release can push to the shared tap between our clone and
          # push, so rebase and retry instead of failing on a non-fast-forward.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "tap push failed after retries" >&2
              exit 1
            fi
            git pull --rebase
          done
