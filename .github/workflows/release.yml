name: release

# Cross-builds vamoose on every v* tag, attaches the macOS and Linux tarballs, the
# Windows zips, and checksums to the release, and (when a tap token is present) bumps
# the Homebrew formula.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Test
        run: go test ./...

      - name: Cross-build and package
        env:
          TAG: ${{ github.ref_name }}
          # Built-in Google OAuth desktop client, so users sign in with `vamoose login`
          # without registering their own Cloud project. Empty when the secrets are
          # unset, which leaves the built-in client off and changes no behavior.
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          pkg="github.com/dcadolph/vamoose/cmd"
          ldflags="-s -w -X '${pkg}.version=${VER}' -X '${pkg}.builtinGoogleClientID=${GOOGLE_CLIENT_ID}' -X '${pkg}.builtinGoogleClientSecret=${GOOGLE_CLIENT_SECRET}'"
          mkdir -p build dist
          # macOS and Linux ship as tarballs for Homebrew; Windows ships as zips, the
          # convention there. All builds are CGO-free so they cross-compile anywhere.
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            case "$os" in darwin) osl=Darwin ;; linux) osl=Linux ;; windows) osl=Windows ;; esac
            case "$arch" in amd64) al=x86_64 ;; arm64) al=arm64 ;; esac
            bin=vamoose
            [ "$os" = windows ] && bin=vamoose.exe
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "$ldflags" -o "build/$bin" .
            if [ "$os" = windows ]; then
              ( cd build && zip -q "../dist/vamoose_${VER}_${osl}_${al}.zip" "$bin" )
            else
              tar -C build -czf "dist/vamoose_${VER}_${osl}_${al}.tar.gz" "$bin"
            fi
            rm "build/$bin"
          done
          ( cd dist && sha256sum vamoose_* | tee checksums.txt )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          fail_on_unmatched_files: true

      - name: Bump Homebrew formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping formula bump"
            exit 0
          fi
          VER="${TAG#v}"
          da=$(sha256sum "dist/vamoose_${VER}_Darwin_arm64.tar.gz" | cut -d' ' -f1)
          di=$(sha256sum "dist/vamoose_${VER}_Darwin_x86_64.tar.gz" | cut -d' ' -f1)
          la=$(sha256sum "dist/vamoose_${VER}_Linux_arm64.tar.gz" | cut -d' ' -f1)
          li=$(sha256sum "dist/vamoose_${VER}_Linux_x86_64.tar.gz" | cut -d' ' -f1)
          base="https://github.com/dcadolph/vamoose/releases/download/v${VER}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/dcadolph/homebrew-tap.git" tap
          cat > tap/Formula/vamoose.rb <<EOF
          class Vamoose < Formula
            desc "Calendar workflow engine for time off, approvals, and quick actions"
            homepage "https://vamoose.dev"
            version "${VER}"
            license "BUSL-1.1"

            on_macos do
              on_arm do
                url "${base}/vamoose_${VER}_Darwin_arm64.tar.gz"
                sha256 "${da}"
              end
              on_intel do
                url "${base}/vamoose_${VER}_Darwin_x86_64.tar.gz"
                sha256 "${di}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/vamoose_${VER}_Linux_arm64.tar.gz"
                sha256 "${la}"
              end
              on_intel do
                url "${base}/vamoose_${VER}_Linux_x86_64.tar.gz"
                sha256 "${li}"
              end
            end

            def install
              bin.install "vamoose"
            end

            test do
              system "#{bin}/vamoose", "version"
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vamoose.rb
          git commit -m "Update vamoose to ${VER}"
          # Another formula's release can push to the shared tap between our clone and
          # push, so rebase and retry instead of failing on a non-fast-forward.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "tap push failed after retries" >&2
              exit 1
            fi
            git pull --rebase
          done
