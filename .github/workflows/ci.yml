# CI builds, vets, lints, and race-tests vamoose on every push and pull request. Tests
# run on Linux, macOS, and Windows: Linux is the hosting and Docker target, macOS is the
# primary desktop target for the menu bar app and the EventKit bridge, and Windows is a
# released CLI platform.
name: CI

on:
  push:
  pull_request:

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # One shell everywhere, so the pipeline steps below work on Windows too.
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      # The suite finishes in seconds per package on every platform, so a short timeout
      # turns a hung test into a fast failure with a goroutine dump instead of a silent
      # ten-minute stall.
      - name: Test
        run: go test -race -timeout=4m -covermode=atomic -coverprofile=coverage.out ./...
      - name: Coverage total
        run: go tool cover -func=coverage.out | tail -1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Build golangci-lint from source with the repo's Go toolchain. A prebuilt
      # release is built with an older Go and refuses to run against a newer go.mod.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Lint
        run: golangci-lint run ./...
